<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>翻页电子书</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }
        #book {
            background: #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }
        .page {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #fff;
        }
        .page img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
    </style>
</head>
<body>

<div id="book"></div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/turn.js@4.1.0/turn.min.js"></script>

<script>
$(function () {
    function resizeBook() {
        let winW = $(window).width();
        let w, h;

        if (winW < 768) {
            w = winW * 0.95;
            h = w * 1.4;
        } else {
            w = 900;
            h = 650;
        }

        $("#book").css({
            width: w,
            height: h
        });
    }

    resizeBook();
    $(window).resize(resizeBook);

    $("#book").turn({
        width: $("#book").width(),
        height: $("#book").height(),
        autoCenter: true,
        display: "double",
        acceleration: true,
        duration: 500
    });

    // 自动加载 1-60 页
    for (let i = 1; i <= 60; i++) {
        $("#book").turn("addPage", `
        <div class="page">
            <img src="images/${i}.jpg" alt="page${i}">
        </div>`, i);
    }
});
</script>

</body>
</html>
