<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>翻页电子书</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f0f0f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }
        #book {
            background: #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }
        .page {
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .page img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #fff;
        }
    </style>
</head>
<body>
    <div id="book"></div>

    <!-- 用本地文件，彻底解决CDN加载失败问题 -->
    <script src="js/jquery.min.js"></script>
    <script src="js/turn.min.js"></script>

    <script>
        // 等所有资源加载完再初始化，彻底解决白屏
        window.onload = function() {
            // 自适应尺寸
            function resizeBook() {
                let winW = $(window).width();
                let bookW, bookH;

                if (winW < 768) { // 手机端
                    bookW = winW * 0.95;
                    bookH = bookW * 1.4;
                } else { // 电脑端
                    bookW = 800;
                    bookH = 600;
                }

                $("#book").css({
                    width: bookW,
                    height: bookH
                });
            }

            // 初始化尺寸
            resizeBook();
            $(window).resize(resizeBook);

            // 初始化翻页插件（核心修复：先创建容器再加载页面）
            const book = $("#book");
            book.turn({
                width: book.width(),
                height: book.height(),
                autoCenter: true,
                display: "double",
                acceleration: true,
                duration: 600,
                pages: 60 // 明确总页数
            });

            // 循环添加1-60页图片
            for (let i = 1; i <= 60; i++) {
                book.turn("addPage", `
                    <div class="page">
                        <img src="images/${i}.jpg" alt="第${i}页">
                    </div>
                `, i);
            }
        };
    </script>
</body>
</html>
