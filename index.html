<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>我的电子书</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f1f1f1; padding: 10px; }
        .book {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }
        .page {
            width: 100%;
            display: none;
        }
        .page.active {
            display: block;
        }
        .page img {
            width: 100%;
            display: block;
        }
        .nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 15px;
            background: white;
            margin-top: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background: #333;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="book">
    <!-- 自动生成 1-60 页图片 -->
</div>

<div class="nav">
    <button onclick="prev()">上一页</button>
    <span id="pageNum">第 1 页 / 共 60 页</span>
    <button onclick="next()">下一页</button>
</div>

<script>
    let currentPage = 1;
    const totalPages = 60;
    const book = document.querySelector('.book');

    // 生成 1-60 页
    for (let i = 1; i <= totalPages; i++) {
        let div = document.createElement('div');
        div.className = 'page' + (i === 1 ? ' active' : '');
        div.innerHTML = `<img src="images/${i}.jpg" alt="第${i}页">`;
        book.appendChild(div);
    }

    // 上一页
    function prev() {
        if (currentPage > 1) {
            document.querySelectorAll('.page')[currentPage - 1].classList.remove('active');
            currentPage--;
            document.querySelectorAll('.page')[currentPage - 1].classList.add('active');
            updatePageNum();
        }
    }

    // 下一页
    function next() {
        if (currentPage < totalPages) {
            document.querySelectorAll('.page')[currentPage - 1].classList.remove('active');
            currentPage++;
            document.querySelectorAll('.page')[currentPage - 1].classList.add('active');
            updatePageNum();
        }
    }

    // 更新页码
    function updatePageNum() {
        document.getElementById('pageNum').innerText = `第 ${currentPage} 页 / 共 ${totalPages} 页`;
    }
</script>

</body>
</html>
