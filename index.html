<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鑫质信产品画册</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #f0f0f0; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            padding-bottom: 80px;
        }
        .book {
            width: 95vw;
            max-width: 1000px;
            height: calc(95vw * 0.707);
            max-height: 90vh;
            position: relative;
            background: #fff;
            box-shadow: 0 0 30px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
        }
        .page-left, .page-right {
            width: 50%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #fff;
            padding: 10px;
        }
        .page-left img, .page-right img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
        }
        @media (max-width: 768px) {
            .book {
                height: calc(95vw * 1.414);
                max-height: 75vh;
            }
            .page-left { display: none; }
            .page-right { 
                width: 100%; 
                padding: 5px;
            }
        }
        .nav {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            padding: 8px 18px;
            border-radius: 8px;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            width: auto;
            min-width: 280px;
        }
        button {
            padding: 8px 16px;
            background: #333;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        button:hover { background: #555; }
        #pageInfo {
            color: white;
            font-size: 14px;
            min-width: 60px;
            text-align: center;
            white-space: nowrap;
        }
        @media (max-width: 768px) {
            .nav {
                padding: 6px 15px;
                gap: 12px;
                min-width: 260px;
                bottom: 10px;
            }
            button {
                padding: 6px 12px;
                font-size: 13px;
            }
            #pageInfo {
                font-size: 13px;
                min-width: 50px;
            }
        }
    </style>
</head>
<body>

<div class="book">
    <div class="page-left"><img id="img-left" src="" alt="左页" loading="lazy"></div>
    <div class="page-right"><img id="img-right" src="" alt="右页" loading="lazy"></div>
</div>

<div class="nav">
    <button onclick="prevPage()">← 上一页</button>
    <span id="pageInfo">1 / 60</span>
    <button onclick="nextPage()">下一页 →</button>
</div>

<script>
    const totalPages = 60;
    let currentPage = 1;
    const imgLeft = document.getElementById('img-left');
    const imgRight = document.getElementById('img-right');
    const pageInfo = document.getElementById('pageInfo');
    const isMobile = window.innerWidth < 768;

    updatePages();

    function updatePages() {
        imgLeft.src = "";
        imgRight.src = "";

        if (!isMobile) {
            if (currentPage === 1) {
                imgLeft.style.display = "none";
                imgRight.src = `./images/${currentPage}.webp`;
                imgRight.style.display = "block";
                pageInfo.textContent = `${currentPage} / ${totalPages}`;
            } else if (currentPage === totalPages) {
                imgLeft.style.display = "block";
                imgLeft.src = `./images/${currentPage - 1}.webp`;
                imgRight.src = `./images/${currentPage}.webp`;
                pageInfo.textContent = `${currentPage - 1}-${currentPage} / ${totalPages}`;
            } else {
                imgLeft.style.display = "block";
                imgLeft.src = `./images/${currentPage}.webp`;
                imgRight.src = `./images/${currentPage + 1}.webp`;
                pageInfo.textContent = `${currentPage}-${currentPage + 1} / ${totalPages}`;
            }
        } else {
            imgLeft.style.display = "none";
            imgRight.src = `./images/${currentPage}.webp`;
            imgRight.style.display = "block";
            pageInfo.textContent = `${currentPage} / ${totalPages}`;
        }
    }

    function nextPage() {
        if (isMobile) {
            if (currentPage < totalPages) {
                currentPage++;
                updatePages();
            }
        } else {
            if (currentPage === 1) {
                currentPage = 2;
            } else if (currentPage < totalPages - 1) {
                currentPage += 2;
            } else if (currentPage === totalPages - 1) {
                currentPage = totalPages;
            }
            updatePages();
        }
    }

    function prevPage() {
        if (isMobile) {
            if (currentPage > 1) {
                currentPage--;
                updatePages();
            }
        } else {
            if (currentPage === 2) {
                currentPage = 1;
            } else if (currentPage === totalPages) {
                currentPage = totalPages - 1;
            } else if (currentPage > 1) {
                currentPage -= 2;
            }
            updatePages();
        }
    }

    document.querySelector('.book').addEventListener('click', (e) => {
        const book = e.currentTarget;
        const x = e.clientX - book.getBoundingClientRect().left;
        const center = book.offsetWidth / 2;
        x > center ? nextPage() : prevPage();
    });

    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') prevPage();
        if (e.key === 'ArrowRight') nextPage();
    });

    window.addEventListener('resize', () => {
        const newIsMobile = window.innerWidth < 768;
        if (newIsMobile !== isMobile) {
            location.reload();
        }
    });
</script>

</body>
</html>
