<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>翻页电子书</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f0f0f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }
        #book {
            background: #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }
        .turn-page {
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .turn-page img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
        }
    </style>
</head>
<body>
    <div id="book"></div>

    <!-- 本地文件加载，确保稳定 -->
    <script src="js/jquery.min.js"></script>
    <script src="js/turn.min.js"></script>

    <script>
        $(document).ready(function() {
            // 1. 先创建所有页面，再初始化翻页（核心修复）
            const pagesHtml = [];
            for (let i = 1; i <= 60; i++) {
                pagesHtml.push(`
                    <div class="turn-page">
                        <img src="images/${i}.jpg" alt="第${i}页">
                    </div>
                `);
            }

            // 2. 自适应尺寸，手机/电脑自动适配
            function resizeBook() {
                const winW = $(window).width();
                let bookW, bookH, displayMode;

                if (winW < 768) {
                    // 手机端：单页显示，避免白屏
                    bookW = winW * 0.95;
                    bookH = bookW * 1.4;
                    displayMode = "single";
                } else {
                    // 电脑端：双页显示
                    bookW = 800;
                    bookH = 600;
                    displayMode = "double";
                }

                $("#book").css({
                    width: bookW,
                    height: bookH
                });

                // 动态更新翻页显示模式
                if ($("#book").turn("is")) {
                    $("#book").turn("display", displayMode);
                    $("#book").turn("size", bookW, bookH);
                }
            }

            // 3. 初始化翻页（先加载页面，再初始化）
            $("#book").html(pagesHtml.join("")).turn({
                autoCenter: true,
                display: $(window).width() < 768 ? "single" : "double",
                acceleration: true,
                duration: 600,
                elevation: 50,
                gradients: true,
                pages: 60
            });

            // 4. 窗口大小变化时自动适配
            resizeBook();
            $(window).resize(resizeBook);
        });
    </script>
</body>
</html>
